AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Tennis-Trainings-Runden Backend v2 - Delete Spieler

Parameters:
  JWTSecret:
    Type: String
    NoEcho: true
    # Kein Default — muss beim Deployment explizit gesetzt werden
    Description: "REQUIRED: Secret key for JWT signing (openssl rand -base64 32)"
  AllowedOrigin:
    Type: String
    Default: 'https://tennis-training.vercel.app'
    Description: Allowed CORS origin
  DeployVersion:
    Type: String
    Default: 'v2-cors-preflight-fix'
    Description: Deployment version tag
  SESFromEmail:
    Type: String
    Default: 'noreply@training.de'
    Description: Absender-Adresse für System-Mails
  FrontendUrl:
    Type: String
    Default: 'https://tennis-training.vercel.app'
    Description: URL des Frontends für Links in E-Mails

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs22.x
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref ClubAppTable
        CORS_ORIGIN: !Ref AllowedOrigin
        JWT_SECRET: !Ref JWTSecret
        SES_FROM_EMAIL: !Ref SESFromEmail
        FRONTEND_URL: !Ref FrontendUrl
        STAGE: 'prod'
    Architectures:
      - arm64

Resources:
  # DynamoDB Table (eigene Tabelle für Datenisolierung)
  ClubAppTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ClubApp
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ClubAppApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      MinimumCompressionSize: 1024
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
        AllowCredentials: false
        MaxAge: "'600'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        UNAUTHORIZED:
          StatusCode: 401
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: 50
          ThrottlingBurstLimit: 100
        - ResourcePath: "/auth/login"
          HttpMethod: "POST"
          ThrottlingRateLimit: 5
          ThrottlingBurstLimit: 10
        - ResourcePath: "/auth/passwort-vergessen"
          HttpMethod: "POST"
          ThrottlingRateLimit: 3
          ThrottlingBurstLimit: 5
        - ResourcePath: "/auth/reset-password"
          HttpMethod: "POST"
          ThrottlingRateLimit: 3
          ThrottlingBurstLimit: 5
      Auth:
        DefaultAuthorizer: JWTAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          JWTAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionPayloadType: TOKEN
            Identity:
              Header: Authorization
              ValidationExpression: "^Bearer [-0-9a-zA-Z\\._]*$"
              ReauthorizeEvery: 60

  # Authorizer
  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: handlers/authorizer.handler
      Environment:
        Variables:
          JWT_SECRET: !Ref JWTSecret

  # Auth (Login/Logout/Password - no authorizer)
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: handlers/auth.handler
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref ClubAppApi
            Path: /auth/login
            Method: post
            Auth:
              Authorizer: NONE
        Logout:
          Type: Api
          Properties:
            RestApiId: !Ref ClubAppApi
            Path: /auth/logout
            Method: post
            Auth:
              Authorizer: NONE
        PasswortVergessen:
          Type: Api
          Properties:
            RestApiId: !Ref ClubAppApi
            Path: /auth/passwort-vergessen
            Method: post
            Auth:
              Authorizer: NONE
        Refresh:
          Type: Api
          Properties:
            RestApiId: !Ref ClubAppApi
            Path: /auth/refresh
            Method: post
            Auth:
              Authorizer: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClubAppTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*'

  # Auth (geschützte Endpunkte - mit Authorizer)
  AuthProtectedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: handlers/auth.handler
      Events:
        ChangePassword:
          Type: Api
          Properties:
            RestApiId: !Ref ClubAppApi
            Path: /auth/change-password
            Method: post
        ResetPassword:
          Type: Api
          Properties:
            RestApiId: !Ref ClubAppApi
            Path: /auth/reset-password
            Method: post
        Impersonate:
          Type: Api
          Properties:
            RestApiId: !Ref ClubAppApi
            Path: /auth/impersonate
            Method: post
        Erstanmeldung:
          Type: Api
          Properties:
            RestApiId: !Ref ClubAppApi
            Path: /auth/erstanmeldung
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClubAppTable

